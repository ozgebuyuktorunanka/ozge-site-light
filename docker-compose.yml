services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ozge
      POSTGRES_PASSWORD: ozge
      POSTGRES_DB: ozge_site
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ozge -d ozge_site"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://ozge:ozge@db:5432/ozge_site?schema=public
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ""
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  db_data:
